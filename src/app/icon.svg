<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a4235" />
      <stop offset="100%" stop-color="#2a1b13" />
    </linearGradient>
    <linearGradient id="logoPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e1b6" />
      <stop offset="50%" stop-color="#d9b66c" />
      <stop offset="100%" stop-color="#b68936" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Premium Background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGlow)" />
  <rect width="508" height="508" x="2" y="2" rx="98" ry="98" fill="none" stroke="#806250" stroke-width="4" opacity="0.4" />

  <g filter="url(#softShadow)" transform="translate(0, 0)">
    <!-- Monogram B -->
    <path d="M 170 140 V 372" stroke="url(#logoPrimary)" stroke-width="48" stroke-linecap="round" />
    <path d="M 170 140 H 260 C 310 140 340 165 340 205 C 340 235 315 255 280 260" fill="none" stroke="url(#logoPrimary)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 170 260 H 275 C 330 260 365 285 365 325 C 365 365 325 372 275 372 H 170" fill="none" stroke="url(#logoPrimary)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Monogram S Intersecting -->
    <path d="M 370 180 C 350 140 310 120 270 120 C 230 120 190 145 190 185 C 190 230 330 240 330 295 C 330 340 290 380 240 380 C 190 380 150 350 130 310" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
  </g>
</svg>
